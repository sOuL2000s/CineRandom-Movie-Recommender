<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineRandom | Discover Your Next Favorite Movie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        :root {
            --primary: #3b82f6;
            --accent: #8b5cf6;
            --bg: #0f172a;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: #f8fafc;
            overflow-x: hidden;
        }

        .movie-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
        }

        .movie-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-hover-effect {
            position: relative;
            overflow: hidden;
        }
        .btn-hover-effect::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease-out, height 0.6s ease-out;
        }
        .btn-hover-effect:active::after {
            width: 300px;
            height: 300px;
            opacity: 0;
        }

        .focus-ring:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        #error-banner {
            transform: translateY(-100%);
            transition: transform 0.3s ease-out;
        }
        #error-banner.show { transform: translateY(0); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8 pb-16">

    <!-- Error Banner -->
    <div id="error-banner" class="fixed top-0 left-0 right-0 bg-red-500 text-white p-4 text-center z-50 font-bold shadow-lg pointer-events-none">
        <i class="fas fa-exclamation-circle mr-2"></i> <span id="error-message"></span>
    </div>

    <!-- Header -->
    <header class="w-full max-w-6xl flex flex-col sm:flex-row justify-between items-center mb-12 gap-4">
        <h1 class="text-4xl font-extrabold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent tracking-tight">
            CineRandom
        </h1>
        <div id="stats" class="flex items-center gap-3 bg-slate-800/50 px-4 py-2 rounded-full border border-slate-700">
            <span class="text-xs text-slate-400 uppercase tracking-widest font-bold">Local Cache</span>
            <div id="cache-loader" class="loader w-4 h-4"></div>
            <span id="cache-count" class="hidden text-blue-400 font-mono font-bold">0</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="w-full max-w-4xl flex flex-col items-center">
        
        <!-- Welcome Section -->
        <div id="welcome-ui" class="text-center mb-12 max-w-2xl">
            <h2 class="text-4xl md:text-6xl font-bold mb-6 leading-tight">Don't know what to watch?</h2>
            <p class="text-slate-400 text-lg md:text-xl">Discover highly-rated hidden gems. One click, endless possibilities.</p>
        </div>

        <!-- Customization Filters (Task 2) -->
        <div id="filters" class="w-full max-w-4xl bg-slate-800/40 p-6 rounded-2xl border border-slate-700/50 mb-8 fade-in">
            <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                <i class="fas fa-sliders-h text-blue-400"></i> Customization Options
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Genre</label>
                    <select id="filter-genre" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none text-slate-200">
                        <option value="">All Genres</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Min Rating: <span id="rating-display" class="text-blue-400">0.0</span></label>
                    <input type="range" id="filter-rating" min="0" max="10" step="0.5" value="0" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
                </div>
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">From Year</label>
                        <input type="number" id="filter-year-min" placeholder="1900" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none text-slate-200">
                    </div>
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">To Year</label>
                        <input type="number" id="filter-year-max" placeholder="2024" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none text-slate-200">
                    </div>
                </div>
            </div>
        </div>

        <!-- Movie Skeletons Grid (Task 4) -->
        <div id="movie-skeleton" class="hidden w-full grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
            <div class="movie-card rounded-2xl aspect-[2/3] skeleton"></div>
            <div class="movie-card rounded-2xl aspect-[2/3] skeleton"></div>
            <div class="movie-card rounded-2xl aspect-[2/3] skeleton"></div>
            <div class="movie-card rounded-2xl aspect-[2/3] skeleton"></div>
            <div class="movie-card rounded-2xl aspect-[2/3] skeleton"></div>
            <div class="movie-card rounded-2xl aspect-[2/3] skeleton"></div>
        </div>

        <!-- Movie Recommendations Grid (Task 4) -->
        <div id="recommendations-grid" class="hidden w-full grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-8"></div>

        <!-- Single Movie Detail Modal (Task 4) -->
        <div id="movie-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-sm">
            <div class="relative w-full max-w-4xl max-h-[90vh] overflow-y-auto movie-card rounded-2xl shadow-2xl">
                <button id="close-modal" class="fixed md:absolute top-4 right-4 z-[110] bg-slate-900/80 hover:bg-slate-700 p-3 rounded-full transition-colors border border-slate-700">
                    <i class="fas fa-times text-xl"></i>
                </button>
                <div class="flex flex-col md:flex-row">
                    <div class="w-full md:w-80 shrink-0 bg-slate-800 flex items-center justify-center min-h-[400px] relative">
                        <img id="movie-poster" src="" alt="" class="w-full h-full object-cover opacity-0 transition-opacity duration-500">
                        <div id="poster-placeholder" class="hidden absolute flex flex-col items-center text-slate-500">
                            <i class="fas fa-film text-4xl mb-2"></i>
                            <span class="text-xs">No Poster Available</span>
                        </div>
                    </div>
                    <div class="p-6 md:p-10 flex-1">
                        <div class="flex flex-col sm:flex-row justify-between items-start gap-4 mb-6">
                            <h2 id="movie-title" class="text-3xl md:text-4xl font-bold leading-tight"></h2>
                            <span id="movie-rating" class="shrink-0 bg-yellow-500 text-black px-4 py-1.5 rounded-full font-black text-sm shadow-lg shadow-yellow-500/20"></span>
                        </div>
                        
                        <div class="flex flex-wrap gap-2 mb-6" id="movie-genres"></div>
                        
                        <p id="movie-overview" class="text-slate-300 text-lg leading-relaxed mb-8"></p>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 text-sm mb-8 border-t border-slate-700/50 pt-6">
                            <div>
                                <p class="text-slate-500 uppercase tracking-tighter font-bold mb-1">Release Date</p>
                                <p id="movie-date" class="text-slate-200 text-base"></p>
                            </div>
                            <div>
                                <p class="text-slate-500 uppercase tracking-tighter font-bold mb-1">Runtime</p>
                                <p id="movie-runtime" class="text-slate-200 text-base"></p>
                            </div>
                        </div>

                        <div class="mb-8">
                            <p class="text-slate-500 uppercase tracking-tighter font-bold mb-2">Top Cast</p>
                            <p id="movie-cast" class="text-slate-200"></p>
                        </div>

                        <div class="flex flex-col sm:flex-row gap-4">
                            <a id="movie-trailer" target="_blank" class="focus-ring flex-1 inline-flex items-center justify-center gap-2 bg-red-600 hover:bg-red-700 transition-all px-8 py-4 rounded-xl font-bold text-white btn-hover-effect">
                                <i class="fab fa-youtube text-xl"></i> Watch Trailer
                            </a>
                            <p id="no-trailer-msg" class="hidden text-slate-500 italic text-sm self-center">Trailer currently unavailable</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Button -->
        <div class="mt-4">
            <button id="generate-btn" class="focus-ring group relative px-10 py-5 bg-blue-600 hover:bg-blue-500 rounded-2xl font-black text-xl transition-all transform hover:scale-[1.02] active:scale-95 shadow-2xl shadow-blue-600/20 btn-hover-effect">
                <span id="btn-text" class="flex items-center gap-2">
                    <i class="fas fa-random"></i> Surprise Me!
                </span>
                <div id="btn-loader" class="hidden loader"></div>
            </button>
        </div>

    </main>

    <!-- Firebase & Logic -->
    <script type="module">
        // Import Firebase SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getFirestore, doc, setDoc, getDoc, collection, getCountFromServer, 
            query, where, limit, getDocs, orderBy 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: import.meta.env.VITE_FIREBASE_API_KEY,
            authDomain: import.meta.env.VITE_FIREBASE_AUTH_DOMAIN,
            projectId: import.meta.env.VITE_FIREBASE_PROJECT_ID,
            storageBucket: import.meta.env.VITE_FIREBASE_STORAGE_BUCKET,
            messagingSenderId: import.meta.env.VITE_FIREBASE_MESSAGING_SENDER_ID,
            appId: import.meta.env.VITE_FIREBASE_APP_ID,
            measurementId: import.meta.env.VITE_FIREBASE_MEASUREMENT_ID
        };

        const TMDB_API_KEY = import.meta.env.VITE_TMDB_API_KEY;
        // --- END CONFIGURATION ---

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // UI Elements
        const generateBtn = document.getElementById('generate-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoader = document.getElementById('btn-loader');
        const recommendationsGrid = document.getElementById('recommendations-grid');
        const movieModal = document.getElementById('movie-modal');
        const closeModalBtn = document.getElementById('close-modal');
        const movieSkeleton = document.getElementById('movie-skeleton');
        const welcomeUi = document.getElementById('welcome-ui');
        const cacheCountEl = document.getElementById('cache-count');
        const cacheLoader = document.getElementById('cache-loader');
        const errorBanner = document.getElementById('error-banner');
        const errorMessage = document.getElementById('error-message');
        
        // Filter Elements (Task 2)
        const filterGenre = document.getElementById('filter-genre');
        const filterRating = document.getElementById('filter-rating');
        const ratingDisplay = document.getElementById('rating-display');
        const filterYearMin = document.getElementById('filter-year-min');
        const filterYearMax = document.getElementById('filter-year-max');

        filterRating.addEventListener('input', (e) => ratingDisplay.innerText = parseFloat(e.target.value).toFixed(1));
        closeModalBtn.addEventListener('click', () => movieModal.classList.add('hidden'));
        movieModal.addEventListener('click', (e) => { if(e.target === movieModal) movieModal.classList.add('hidden'); });

        let genreMap = {};

        async function initGenres() {
            try {
                const res = await fetch(`https://api.themoviedb.org/3/genre/movie/list?api_key=${TMDB_API_KEY}&language=en-US`);
                const data = await res.json();
                data.genres.forEach(g => {
                    genreMap[g.id] = g.name;
                    const opt = document.createElement('option');
                    opt.value = g.id;
                    opt.innerText = g.name;
                    filterGenre.appendChild(opt);
                });
            } catch (e) { console.error("Genre fetch failed", e); }
        }
        initGenres();

        function showError(msg) {
            errorMessage.innerText = msg;
            errorBanner.classList.add('show');
            setTimeout(() => errorBanner.classList.remove('show'), 4000);
        }

        // Update Global Cache Stats
        async function updateCacheCount() {
            try {
                cacheLoader.classList.remove('hidden');
                cacheCountEl.classList.add('hidden');
                const coll = collection(db, "movies");
                const snapshot = await getCountFromServer(coll);
                cacheCountEl.innerText = snapshot.data().count;
                cacheCountEl.classList.remove('hidden');
                cacheLoader.classList.add('hidden');
            } catch (e) {
                console.error("Cache count error", e);
                cacheLoader.classList.add('hidden');
            }
        }
        updateCacheCount();

        /**
         * Task 2: Get recommendations based on user filters
         * Task 4: Display 6 recommendations
         */
        async function getRandomMovie() {
            setLoading(true);
            const filters = {
                genreId: filterGenre.value,
                minRating: parseFloat(filterRating.value),
                yearMin: filterYearMin.value ? `${filterYearMin.value}-01-01` : '',
                yearMax: filterYearMax.value ? `${filterYearMax.value}-12-31` : ''
            };

            try {
                // Task 3: Impersonal recommendations
                let discoverUrl = `https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_API_KEY}&language=en-US&include_adult=false`;
                if (filters.genreId) discoverUrl += `&with_genres=${filters.genreId}`;
                if (filters.minRating > 0) discoverUrl += `&vote_average.gte=${filters.minRating}`;
                if (filters.yearMin) discoverUrl += `&primary_release_date.gte=${filters.yearMin}`;
                if (filters.yearMax) discoverUrl += `&primary_release_date.lte=${filters.yearMax}`;
                
                // If no specific quality filters, use popularity (less opinionated discovery)
                discoverUrl += (filters.minRating === 0) ? `&sort_by=popularity.desc` : `&sort_by=vote_average.desc`;

                const randomPage = Math.floor(Math.random() * 20) + 1; 
                discoverUrl += `&page=${randomPage}`;

                const listRes = await fetch(discoverUrl);
                if (!listRes.ok) throw new Error("TMDB API connection failed");
                
                const listData = await listRes.json();
                if (!listData.results || listData.results.length === 0) {
                    throw new Error("No movies found for these criteria.");
                }

                // Pick 6 random movies from results
                const shuffled = listData.results.sort(() => 0.5 - Math.random());
                const selectedBriefs = shuffled.slice(0, 6);

                // Task 3: Broad background caching
                backgroundCacheProcess(listData.results);

                const moviePromises = selectedBriefs.map(async (brief) => {
                    const docRef = doc(db, "movies", brief.id.toString());
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) return docSnap.data();
                    
                    const full = await fetchFullDetails(brief.id);
                    if (full) {
                        try {
                            await setDoc(doc(db, "movies", brief.id.toString()), full);
                            updateCacheCount();
                        } catch(e) {}
                        return full;
                    }
                    return null;
                });

                const finalMovies = (await Promise.all(moviePromises)).filter(m => m !== null);
                if (finalMovies.length === 0) throw new Error("Could not retrieve movie details.");
                
                displayRecommendationGrid(finalMovies);

            } catch (error) {
                console.warn("TMDB error, falling back to cache:", error.message);
                // Task 1: API Fallback to Local Cache
                const cacheMovies = await fetchRandomMoviesFromCache(6, filters);
                if (cacheMovies.length > 0) {
                    displayRecommendationGrid(cacheMovies);
                } else {
                    showError(error.message || "An error occurred and no cached movies match filters.");
                }
            }
            setLoading(false);
        }

        /**
         * Task 1: Practical Firestore random fetch with in-memory filtering
         */
        async function fetchRandomMoviesFromCache(count, filters) {
            try {
                let q = collection(db, "movies");
                // Fetch a practical batch and filter in-memory
                const snap = await getDocs(query(q, limit(100)));
                let pool = snap.docs.map(d => d.data());

                if (filters.genreId) {
                    const genreName = genreMap[filters.genreId];
                    pool = pool.filter(m => m.genres.includes(genreName));
                }
                if (filters.minRating > 0) {
                    pool = pool.filter(m => parseFloat(m.rating) >= filters.minRating);
                }
                if (filters.yearMin || filters.yearMax) {
                    pool = pool.filter(m => {
                        if (m.release_date === "Unknown") return false;
                        const yr = parseInt(m.release_date.split('-')[0]);
                        const min = filters.yearMin ? parseInt(filters.yearMin.split('-')[0]) : 0;
                        const max = filters.yearMax ? parseInt(filters.yearMax.split('-')[0]) : 9999;
                        return yr >= min && yr <= max;
                    });
                }

                return pool.sort(() => 0.5 - Math.random()).slice(0, count);
            } catch (e) {
                console.error("Cache fallback error", e);
                return [];
            }
        }

        /**
         * Task 3: Broader Caching Logic
         */
        async function backgroundCacheProcess(movies) {
            const tasks = movies.map(async (m) => {
                // Criteria: 6.0+ rating and 50+ votes
                if (m.vote_average >= 6.0 && m.vote_count >= 50 && m.poster_path) {
                    try {
                        const id = m.id.toString();
                        const docRef = doc(db, "movies", id);
                        const snap = await getDoc(docRef);
                        if (!snap.exists()) {
                            const details = await fetchFullDetails(m.id);
                            if (details) {
                                await setDoc(doc(db, "movies", id), details);
                                return true;
                            }
                        }
                    } catch (e) { return false; }
                }
                return false;
            });
            const results = await Promise.all(tasks);
            if (results.some(r => r === true)) updateCacheCount();
        }

        async function fetchFullDetails(id) {
            try {
                const [detailRes, creditRes, videoRes] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${TMDB_API_KEY}`),
                    fetch(`https://api.themoviedb.org/3/movie/${id}/credits?api_key=${TMDB_API_KEY}`),
                    fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${TMDB_API_KEY}`)
                ]);

                if (!detailRes.ok) return null;

                const details = await detailRes.json();
                const credits = await creditRes.json();
                const videos = await videoRes.json();

                const trailer = videos.results?.find(v => v.type === 'Trailer' && v.site === 'YouTube');

                return {
                    id: details.id,
                    title: details.title || "Unknown Title",
                    overview: details.overview || "No description available for this movie.",
                    poster: details.poster_path ? `https://image.tmdb.org/t/p/w500${details.poster_path}` : null,
                    rating: details.vote_average ? details.vote_average.toFixed(1) : "N/A",
                    release_date: details.release_date || "Unknown",
                    runtime: details.runtime ? `${details.runtime} mins` : "N/A",
                    genres: details.genres ? details.genres.map(g => g.name) : [],
                    cast: credits.cast ? credits.cast.slice(0, 5).map(c => c.name).join(', ') : "Not available",
                    trailer_url: trailer ? `https://www.youtube.com/watch?v=${trailer.key}` : '#'
                };
            } catch (e) {
                console.error("Fetch details error", e);
                return null;
            }
        }

        /**
         * Task 4: Display results in grid
         */
        function displayRecommendationGrid(moviesArray) {
            welcomeUi.classList.add('hidden');
            movieSkeleton.classList.add('hidden');
            recommendationsGrid.classList.remove('hidden');
            recommendationsGrid.innerHTML = '';
            
            moviesArray.forEach(movie => {
                const card = document.createElement('div');
                card.className = "movie-card rounded-2xl overflow-hidden cursor-pointer group fade-in";
                card.innerHTML = `
                    <div class="relative aspect-[2/3] bg-slate-800">
                        <img src="${movie.poster || ''}" alt="${movie.title}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-transparent to-transparent opacity-60"></div>
                        <div class="absolute bottom-4 left-4 right-4">
                            <span class="bg-yellow-500 text-black px-2 py-0.5 rounded text-[10px] font-black shadow-lg">⭐ ${movie.rating}</span>
                            <h3 class="text-white font-bold mt-1 line-clamp-1">${movie.title}</h3>
                            <p class="text-slate-400 text-[10px] uppercase font-bold">${movie.genres.slice(0, 2).join(' • ')}</p>
                        </div>
                    </div>
                `;
                card.addEventListener('click', () => showSingleMovieDetailsModal(movie));
                recommendationsGrid.appendChild(card);
            });

            window.scrollTo({ top: recommendationsGrid.offsetTop - 100, behavior: 'smooth' });
        }

        /**
         * Task 4: Adaptation of original display logic to a modal
         */
        function showSingleMovieDetailsModal(data) {
            movieModal.classList.remove('hidden');
            
            const posterImg = document.getElementById('movie-poster');
            const placeholder = document.getElementById('poster-placeholder');
            
            posterImg.style.opacity = '0';
            if (data.poster) {
                posterImg.src = data.poster;
                posterImg.alt = `Poster for ${data.title}`;
                posterImg.onload = () => { posterImg.style.opacity = '1'; placeholder.classList.add('hidden'); };
                placeholder.classList.add('hidden');
            } else {
                posterImg.src = "";
                placeholder.classList.remove('hidden');
            }

            document.getElementById('movie-title').innerText = data.title;
            document.getElementById('movie-rating').innerText = `⭐ ${data.rating}`;
            document.getElementById('movie-overview').innerText = data.overview;
            document.getElementById('movie-date').innerText = data.release_date;
            document.getElementById('movie-runtime').innerText = data.runtime;
            document.getElementById('movie-cast').innerText = data.cast;
            
            const genreContainer = document.getElementById('movie-genres');
            genreContainer.innerHTML = '';
            data.genres.forEach(genre => {
                const span = document.createElement('span');
                span.className = "bg-blue-900/30 text-blue-300 text-xs px-3 py-1.5 rounded-lg border border-blue-700/50 hover:bg-blue-800/40 transition-colors cursor-default";
                span.innerText = genre;
                genreContainer.appendChild(span);
            });

            const trailerBtn = document.getElementById('movie-trailer');
            const noTrailerMsg = document.getElementById('no-trailer-msg');
            if (data.trailer_url === '#' || !data.trailer_url) {
                trailerBtn.classList.add('hidden');
                noTrailerMsg.classList.remove('hidden');
            } else {
                trailerBtn.classList.remove('hidden');
                noTrailerMsg.classList.add('hidden');
                trailerBtn.href = data.trailer_url;
            }
        }

        function setLoading(isLoading) {
            if (isLoading) {
                btnText.classList.add('invisible');
                btnLoader.classList.remove('hidden');
                btnLoader.classList.add('block');
                generateBtn.disabled = true;
                
                if (recommendationsGrid.classList.contains('hidden')) {
                    welcomeUi.classList.add('hidden');
                    movieSkeleton.classList.remove('hidden');
                } else {
                    recommendationsGrid.classList.add('opacity-50');
                    recommendationsGrid.style.pointerEvents = 'none';
                }
            } else {
                btnText.classList.remove('invisible');
                btnLoader.classList.add('hidden');
                generateBtn.disabled = false;
                movieSkeleton.classList.add('hidden');
                recommendationsGrid.classList.remove('opacity-50');
                recommendationsGrid.style.pointerEvents = 'auto';
            }
        }

        generateBtn.addEventListener('click', getRandomMovie);
    </script>
</body>
</html>
