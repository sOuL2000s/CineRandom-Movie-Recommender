<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Offline - CineRandom</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #3b82f6;
        }
        p {
            font-size: 1.1em;
            color: #94a3b8;
            max-width: 600px;
            line-height: 1.6;
        }
        a {
            color: #8b5cf6;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
        .icon {
            font-size: 4em;
            color: #334155;
            margin-bottom: 30px;
        }
    </style>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="icon"><i class="fas fa-wifi-slash"></i></div>
    <h1>You're Offline!</h1>
    <p>It looks like you're not connected to the internet. CineRandom needs a connection to fetch new movie recommendations.</p>
    <p>If you've viewed recommendations recently, they might be available in your history sidebar!</p>
    <p>Please check your network connection and try again.</p>
    <p><a href="/">Go to Home</a></p>
</body>
</html>
